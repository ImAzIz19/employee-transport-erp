<div class="mt-8 text-center">
  <div class="w-full flex justify-center">
    <img src="lock.png" alt="" class="w-20 h-20">
  </div>
  <p class="header-2-style">{{'VER-CODE-TEXT' | translate}}</p>
  <app-verification-code-form (verifyCodeEvent)="verifyCode($event)">
  </app-verification-code-form>

  <div class="w-full flex justify-center mt-4">
    <a (click)="resendEmail()" class="hyper-link cursor-pointer">
      {{'EMAIL-RESEND' | translate}}
    </a>
  </div>
  <br>
  <div *ngIf="errorMessage2" class="text-red-500 text-2xl">
    {{ errorMessage2 }}
  </div>
</div>
