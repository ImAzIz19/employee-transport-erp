<div class="container mx-auto p-4 max-w-4xl border border-gray-200 rounded-lg bg-white shadow-sm">
  <h1 class="text-2xl font-bold text-gray-800 mb-6 border-b border-gray-200 pb-2">
    Selection des Stations par Circuit
  </h1>
  
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Available Stations -->
    <div class="border border-gray-200 rounded-lg bg-white">
      <h2 class="text-lg font-semibold text-gray-700 mb-3 border-b border-gray-200 p-3 bg-gray-50">
        Available ({{availableStations.length}})
      </h2>
      <ul class="divide-y divide-gray-200 max-h-96 overflow-y-auto">
        <li *ngFor="let station of availableStations" 
            class="p-3 hover:bg-gray-50 cursor-pointer transition-colors"
            (click)="selectStation(station)">
          <div class="flex items-center">
            <span class="flex-1 text-gray-800">{{ station.refRegion }}</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-500" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
            </svg>
          </div>
        </li>
        <li *ngIf="availableStations.length === 0" class="p-3 text-gray-500 italic">
          No available stations
        </li>
      </ul>
    </div>
    
    <!-- Selected Stations -->
    <div class="border border-gray-200 rounded-lg bg-white">
      <h2 class="text-lg font-semibold text-gray-700 mb-3 border-b border-gray-200 p-3 bg-gray-50">
        Selected ({{selectedStationIds.size}})
      </h2>
      <ul class="divide-y divide-gray-200 max-h-96 overflow-y-auto">
        <li *ngFor="let station of selectedStationsForDisplay" 
            class="p-3 hover:bg-gray-50 cursor-pointer transition-colors"
            (click)="removeStation(station)">
          <div class="flex items-center justify-between">
            <span class="flex-1 text-gray-800">{{ station.refRegion }}</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-500" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
            </svg>
          </div>
        </li>
        <li *ngIf="selectedStationIds.size === 0" class="p-3 text-gray-500 italic">
          No selected stations
        </li>
      </ul>
    </div>
  </div>
  
  <!-- Arrival Point -->
  <div class="mt-6 border border-gray-200 rounded-lg bg-white" *ngIf="arrivalPoint">
    <div class="p-3 border-b border-gray-200 bg-gray-50">
      <span class="font-medium text-gray-700">{{ arrivalPoint }}</span>
    </div>
  </div>
</div>
