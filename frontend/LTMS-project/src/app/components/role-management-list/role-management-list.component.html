<div class="p-4">
  <mat-card class="overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
      <table mat-table [dataSource]="paginatedData" class="w-full">
        <!-- Transaction Column -->
        <ng-container matColumnDef="transaction">
          <th mat-header-cell *matHeaderCellDef class="!bg-gray-50 !text-gray-600">TRANSACTION</th>
          <td mat-cell *matCellDef="let element" class="!text-gray-700">{{element.transaction}}</td>
        </ng-container>

        <!-- Description Column -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef class="!bg-gray-50 !text-gray-600">DESCRIPTION</th>
          <td mat-cell *matCellDef="let element" class="!text-gray-700">{{element.description}}</td>
        </ng-container>

        <!-- Assigned Column -->
        <ng-container matColumnDef="assigned">
          <th mat-header-cell *matHeaderCellDef class="!bg-gray-50 !text-gray-600">ASSIGNED</th>
          <td mat-cell *matCellDef="let element">
            <mat-checkbox 
              [checked]="element.assigned" 
              (change)="onAssignmentChange(element)">
            </mat-checkbox>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns" class="h-12"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:!bg-gray-50 h-10"></tr>
      </table>
    </div>

    <mat-paginator 
      [pageSizeOptions]="pageSizeOptions"
      [pageSize]="pageSize"
      [length]="dataSource.length"
      showFirstLastButtons
      aria-label="Select page of data"
      class="!border-t !border-gray-200"
      (page)="onPageChange($event)">
    </mat-paginator>

    @if (dataSource.length === 0) {
      <div class="p-8 text-center text-gray-500">
        No permissions found
      </div>
    }
  </mat-card>
</div>
