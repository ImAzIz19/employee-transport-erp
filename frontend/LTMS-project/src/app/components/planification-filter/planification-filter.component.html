<!-- planification-filter.component.html -->
<div  class="flex flex-wrap  gap-4 p-4  rounded-lg  mb-6">
  <!-- Name Filter -->
  <div class="relative w-full sm:w-[calc(50%-0.5rem)] md:w-[350px] mb-5">
    <input
      type="text"
      [formControl]="nameFilter" 
      placeholder="Username"
      class="w-full pl-10 pr-4 py-[10px] rounded-full border border-gray-600 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 border-solid "
    />
    <svg
      class="absolute left-3 top-6 -translate-y-1/2 text-gray-400 w-5 h-5 pointer-events-none"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z"
      />
    </svg>
  </div>

  <!-- Plant Section Filter -->
  <mat-form-field 
  appearance="outline"
  class="w-full sm:w-[calc(50%-0.5rem)] md:w-[250px] "
  >
  <mat-label class="text-gray-600">Plant Section</mat-label>
  <mat-select [formControl]="plantSectionFilter" class="!text-gray-800">
    <mat-option value="" >All Plant Sections</mat-option>
    <mat-option 
      *ngFor="let plantSection of plantSections" 
      [value]="plantSection"
      class="hover:!bg-gray-100"
    >
      {{ plantSection }}
    </mat-option>
  </mat-select>
</mat-form-field>

  <!-- Action Type Filter -->
  <mat-form-field   appearance="outline"
  class="w-full sm:w-[calc(50%-0.5rem)] md:w-[200px] ">
    <mat-label class="text-gray-600">Action Type</mat-label>
    <mat-select 
      [formControl]="actionFilter"
      class="!text-gray-800"
    >
      <mat-option value="all" class="hover:!bg-gray-100">All Actions</mat-option>
      <mat-option 
        *ngFor="let mode of importModes" 
        [value]="mode === 'all' ? null : mode"
        class="hover:!bg-gray-100"
      >
        {{mode}}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Week Filter -->
  <mat-form-field   appearance="outline"
  class="w-full sm:w-[calc(50%-0.5rem)] md:w-[200px]">
    <mat-label class="text-gray-600">Calendar Week</mat-label>
    <mat-select [formControl]="weekFilter" class="!text-gray-800">
      <mat-option value="">All Weeks</mat-option>
      <mat-option 
        *ngFor="let week of weeks" 
        [value]="week"
        class="hover:!bg-gray-100"
      >
        {{week}}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <!-- Reset Button -->
  <button 
  mat-stroked-button 
  (click)="resetFilters()"
  class="w-full sm:w-auto !border-gray-300 !text-gray-700 hover:!bg-gray-50 mb-1 h-12 px-4"
>
  <span class="flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" />
    </svg>
  </span>
</button>
</div>
